name: Candy Pearls
version: "0.1.3"
slug: candy_pearls
description: AI-powered candy reward system for kids over Signal — the model handles conversation and pricing, Home Assistant stays the bank.
url: https://github.com/jumlu/ha-candy-pearls
arch:
  - amd64
  - aarch64
init: false
host_network: true
startup: application
boot: auto
map: []

# NOTE: all values below are placeholders/empty on purpose. This file ships
# in the public GitHub repo — real Signal numbers, group IDs and account
# data belong ONLY in the add-on's Configuration tab in HA (stored in
# /data/options.json on the host, never committed to git). See README
# "Adding children" for how to fill these in after installing.
options:
  anthropic_api_key: ""
  ha_token: ""
  ha_base_url: "http://supervisor/core"
  model: "claude-haiku-4-5-20251001"
  max_tokens: 1024
  memory_turns: 10
  memory_minutes: 15
  signal_api_url: "http://127.0.0.1:8090"
  signal_number: ""
  log_level: "info"
  timezone: "UTC"
  language: "en"
  sugar_per_pearl: 5
  require_confirmation: true
  prices_entity: "input_text.perlen_preise"
  whitelist_uuids: []
  accounts: []

schema:
  anthropic_api_key: password
  ha_token: password
  ha_base_url: str
  model: list(claude-haiku-4-5-20251001|claude-sonnet-4-6|claude-opus-4-8|claude-fable-5)
  max_tokens: int
  memory_turns: int
  memory_minutes: int
  signal_api_url: str
  signal_number: str
  log_level: list(debug|info|warning|error)
  timezone: list(UTC|Africa/Cairo|Africa/Johannesburg|Africa/Lagos|America/Anchorage|America/Argentina/Buenos_Aires|America/Bogota|America/Chicago|America/Denver|America/Los_Angeles|America/Mexico_City|America/New_York|America/Phoenix|America/Santiago|America/Sao_Paulo|America/Toronto|America/Vancouver|Asia/Bangkok|Asia/Colombo|Asia/Dhaka|Asia/Dubai|Asia/Hong_Kong|Asia/Jakarta|Asia/Karachi|Asia/Kolkata|Asia/Kuala_Lumpur|Asia/Seoul|Asia/Shanghai|Asia/Singapore|Asia/Taipei|Asia/Tehran|Asia/Tokyo|Atlantic/Azores|Australia/Adelaide|Australia/Brisbane|Australia/Melbourne|Australia/Perth|Australia/Sydney|Europe/Amsterdam|Europe/Athens|Europe/Belgrade|Europe/Berlin|Europe/Brussels|Europe/Bucharest|Europe/Budapest|Europe/Copenhagen|Europe/Dublin|Europe/Helsinki|Europe/Istanbul|Europe/Kyiv|Europe/Lisbon|Europe/London|Europe/Luxembourg|Europe/Madrid|Europe/Moscow|Europe/Oslo|Europe/Paris|Europe/Prague|Europe/Rome|Europe/Sofia|Europe/Stockholm|Europe/Vienna|Europe/Warsaw|Europe/Zurich|Pacific/Auckland|Pacific/Fiji|Pacific/Honolulu)
  language: list(en|de)
  sugar_per_pearl: int
  require_confirmation: bool
  prices_entity: str
  whitelist_uuids:
    - str
  accounts:
    - name: str
      recv_group_id: str
      send_group_id: str
      balance_entity: str
      daily_refill: int
      max_balance: int

ports:
  8099/tcp: 8099
ports_description:
  8099/tcp: Inbound webhook from HA automation
